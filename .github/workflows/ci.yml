name: 🚀 CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ==========================================
  # 🧪 Tests & Build Verification
  # ==========================================
  test-and-build:
    name: 🧪 Tests & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🔧 Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ".go-version"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🔍 Run go vet
        run: go vet ./...

      - name: 🧪 Run tests with coverage (optional)
        run: |
          echo "🧪 Running tests..."
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          if [ -f "coverage.out" ]; then
            echo "📊 Coverage generated"
            go tool cover -func=coverage.out | tail -1
          fi
        continue-on-error: true

      - name: 🏗️ Build verification
        run: |
          echo "🏗️ Building for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -v -o automation-hub ./cmd/automation-hub
          if [ -f "automation-hub" ]; then
            echo "✅ Build successful"
            ls -lh automation-hub
          else
            echo "❌ Build failed"
            exit 1
          fi

  # ==========================================
  # 🧹 Code Linting
  # ==========================================
  lint:
    name: 🧹 Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🔧 Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ".go-version"

      - name: 🧹 golangci-lint
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m --enable=errcheck,govet,staticcheck,unused,misspell,gosec --issues-exit-code=0

  # ============================================
  # 🔒 OSV Scanner - Dependency Vulnerabilities
  # ============================================
  osv-scan:
    name: 🔒 OSV Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 📦 Download OSV Scanner
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl --proto '=https' --tlsv1.2 -sSL "https://github.com/google/osv-scanner/releases/download/v2.2.2/osv-scanner_linux_${ARCH}" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: 🔍 Scan dependencies
        run: |
          osv-scanner scan --lockfile=go.mod --lockfile=go.sum --format=table
        continue-on-error: true

  # ==========================================
  # 🛡️ OWASP Dependency-Check - CVE Scanner
  # ==========================================
  dependency-check:
    name: 🛡️ OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🔧 Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ".go-version"

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🛡️ Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c # main
        id: depcheck
        with:
          project: "automation-hub"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --enableExperimental
            --failOnCVSS 7
            --suppression suppression.xml
        continue-on-error: true
        env:
          JAVA_HOME: /opt/jdk

      - name: 📤 Upload Dependency-Check report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-check-report
          path: reports
          retention-days: 30


  # ==========================================
  # 📊 SonarCloud Analysis
  # ==========================================
  sonar:
    name: 📊 SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # requerido para pedir el token OIDC a Infisical
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # historia completa - si no, Sonar tira warning de "shallow clone"

      - name: 🔧 Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ".go-version"
          cache: true

      - name: 🧪 Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          sed -i 's|^automation-hub/||' coverage.out

      - name: 🔑 Fetch SONAR_TOKEN from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: "oidc"
          identity-id: "77942652-da93-4daa-9f33-62534699496b"
          domain: "https://app.infisical.com"
          project-slug: "homelab-devidence"
          env-slug: "prod" # confirm this matches your "Production" env's slug in Project Settings > Environments
          secret-path: "/cross"
          export-type: "env"

      - name: 📊 SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
