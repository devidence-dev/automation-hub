name: 🚀 Build and Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Cómo incrementar la versión (ignorado si se define custom_tag)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      custom_tag:
        description: "Tag personalizado (e.g. v1.2.3). Anula el bump automático si se define."
        required: false
        type: string
      prerelease:
        description: "Marcar como pre-release?"
        required: false
        default: false
        type: boolean

jobs:
  # ==========================================
  # 🏷️ Calcular versión semver
  # ==========================================
  version:
    name: 🏷️ Calculate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Calculate semver tag
        id: semver
        env:
          CUSTOM_TAG: ${{ inputs.custom_tag }}
          BUMP: ${{ inputs.bump }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ -n "$CUSTOM_TAG" ]; then
            TAG="$CUSTOM_TAG"
            [[ "$TAG" == v* ]] || TAG="v$TAG"
          else
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            [ -z "$LATEST" ] && LATEST="v0.0.0"

            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)

            BUMP_TYPE="$BUMP"
            [ -z "$BUMP_TYPE" ] && BUMP_TYPE="patch"

            case "$BUMP_TYPE" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac

            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          if [ "$PRERELEASE" = "true" ]; then
            TAG="${TAG}-pre.$(date +%Y%m%d%H%M%S)"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Calculated version: $TAG"

  # ==========================================
  # 🏗️ Build & Push image + crear git tag
  # ==========================================
  build:
    name: 🏗️ Build & Push image
    needs: version
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Login to Zot
        run: docker login zot.devidence.dev -u "$ZOT_USERNAME" -p "$ZOT_PASSWORD"

      - name: Build image
        run: |
          GO_VERSION=$(cat .go-version | tr -d '[:space:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          docker build \
            --build-arg GO_VERSION=${GO_VERSION} \
            --platform linux/${ARCH} \
            -f deployments/docker/Dockerfile \
            -t zot.devidence.dev/automation-hub:${{ needs.version.outputs.tag }} \
            .

      - name: Push to Zot
        run: docker push zot.devidence.dev/automation-hub:${{ needs.version.outputs.tag }}

      - name: Create and push git tag
        run: |
          git config user.email "ci@devidence.dev"
          git config user.name "homelab-ci"
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

  # ==========================================
  # 🚀 Deploy to production
  # ==========================================
  deploy:
    name: 🚀 Deploy to production
    needs: [version, build]
    runs-on: self-hosted
    environment: production
    permissions:
      contents: read
    steps:
      - name: Update image tag in homelab
        env:
          HOMELAB_DEPLOY_TOKEN: ${{ secrets.HOMELAB_DEPLOY_TOKEN }}
        run: |
          rm -rf /tmp/homelab-automation-hub-deploy
          git clone https://x-access-token:${HOMELAB_DEPLOY_TOKEN}@github.com/devidence-dev/homelab.git /tmp/homelab-automation-hub-deploy
          cd /tmp/homelab-automation-hub-deploy
          sed -i "s|tag: .*|tag: \"${{ needs.version.outputs.tag }}\"|" \
            kubernetes/internal-apps/automation-hub/values.yaml
          git config user.email "ci@devidence.dev"
          git config user.name "homelab-ci"
          git add kubernetes/internal-apps/automation-hub/values.yaml
          git commit -m "chore(automation-hub): bump image to ${{ needs.version.outputs.tag }}"
          git push
          rm -rf /tmp/homelab-automation-hub-deploy
