# Identificación del proyecto
# TODO: confirmar sonar.projectKey en SonarCloud (Project Information) una vez
# importado el repo - SonarCloud lo asigna automáticamente al importar y no
# siempre sigue el formato <org>_<repo>.
sonar.organization=devidence-dev
sonar.projectKey=devidence-dev_automation-hub
sonar.projectName=Automation Hub
sonar.projectVersion=1.0

# Configuración de fuentes y exclusiones
sonar.sources=.
sonar.exclusions=**/vendor/**,**/*_test.go,**/testdata/**,build/**,deployments/**,docker-compose*.yml,**/*.md,graphify-out/**

# Configuración de tests
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Cobertura (Go)
sonar.go.coverage.reportPaths=coverage.out

# Wiring/entrypoint que no vale la pena mockear
sonar.coverage.exclusions=cmd/automation-hub/main.go

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate - Esperar resultado y fallar si no pasa
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
