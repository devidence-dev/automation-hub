name: 🚀 CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ==========================================
  # 🧪 Tests & Build Verification
  # ==========================================
  test-and-build:
    name: 🧪 Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🔍 Run go vet
        run: go vet ./...

      - name: 🧪 Run tests with coverage (optional)
        run: |
          echo "🧪 Running tests..."
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          if [ -f "coverage.out" ]; then
            echo "📊 Coverage generated"
            go tool cover -func=coverage.out | tail -1
          fi
        continue-on-error: true

      - name: 🏗️ Build verification
        run: |
          echo "🏗️ Building for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -v -o automation-hub ./cmd/automation-hub
          if [ -f "automation-hub" ]; then
            echo "✅ Build successful"
            ls -lh automation-hub
          else
            echo "❌ Build failed"
            exit 1
          fi

  # ==========================================
  # 🧹 Code Linting
  # ==========================================
  lint:
    name: 🧹 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"

      - name: 🧹 golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m --enable=errcheck,govet,staticcheck,unused,misspell,gosec --issues-exit-code=0

  # ============================================
  # 🔒 OSV Scanner - Dependency Vulnerabilities
  # ============================================
  osv-scan:
    name: 🔒 OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Download OSV Scanner
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          wget -q "https://github.com/google/osv-scanner/releases/download/v2.2.2/osv-scanner_linux_${ARCH}" -O osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: 🔍 Scan dependencies
        run: |
          osv-scanner scan --lockfile=go.mod --lockfile=go.sum --format=table
        continue-on-error: true

  # ==========================================
  # 🛡️ OWASP Dependency-Check - CVE Scanner
  # ==========================================
  dependency-check:
    name: 🛡️ OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🛡️ Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: "automation-hub"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --enableExperimental
            --failOnCVSS 7
            --suppression suppression.xml
        continue-on-error: true
        env:
          JAVA_HOME: /opt/jdk

      - name: 📤 Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports
          retention-days: 30

  # =================================================
  # 🔍 SAST + Code Scanning (sin SonarQube)
  # =================================================
  sast:
    name: 🔍 SAST (Semgrep SARIF)
    runs-on: self-hosted
    needs: [test-and-build, lint, osv-scan, dependency-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Install Semgrep
        run: |
          python3 -m pip install --break-system-packages semgrep
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --version

      - name: 🔎 Semgrep scan (SARIF)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            .
        continue-on-error: true

      - name: 🔎 Verify SARIF exists
        if: always()
        run: |
          ls -lah semgrep.sarif
          head -20 semgrep.sarif

      - name: 📤 Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: 📤 Upload Semgrep SARIF artifact (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30
          if-no-files-found: warn
