name: 🚀 Build and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'deployments/docker/Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '.go-version'
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build & Push image
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          GO_VERSION=$(cat .go-version | tr -d '[:space:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          docker build \
            --build-arg GO_VERSION=${GO_VERSION} \
            --platform linux/${ARCH} \
            -f deployments/docker/Dockerfile \
            -t zot.devidence.dev/automation-hub:${{ steps.tag.outputs.tag }} \
            .

      - name: Push to Zot
        run: docker push zot.devidence.dev/automation-hub:${{ steps.tag.outputs.tag }}

  deploy:
    name: 🚀 Deploy to production
    needs: build
    runs-on: self-hosted
    environment: production
    steps:
      - name: Update image tag in homelab
        env:
          HOMELAB_DEPLOY_TOKEN: ${{ secrets.HOMELAB_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMELAB_DEPLOY_TOKEN}@github.com/devidence-dev/homelab.git /tmp/homelab-automation-hub-deploy
          cd /tmp/homelab-automation-hub-deploy
          sed -i "s|tag: .*|tag: \"${{ needs.build.outputs.image_tag }}\"|" \
            kubernetes/internal-apps/automation-hub/values.yaml
          git config user.email "ci@devidence.dev"
          git config user.name "homelab-ci"
          git add kubernetes/internal-apps/automation-hub/values.yaml
          git commit -m "chore(automation-hub): bump image to ${{ needs.build.outputs.image_tag }}"
          git push
          rm -rf /tmp/homelab-automation-hub-deploy
